<!doctype html>
<html lang="id" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FADD GRAPHICS - Freelance Graphic Designer</title>
    <meta
      name="description"
      content="FADD GRAPHICS by Mufaddhol - personal portfolio and freelance graphic design service for logo, poster, social media, and event publication needs."
    />
    <meta
      name="theme-color"
      content="#f7f4ef"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#10141b"
      media="(prefers-color-scheme: dark)"
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="FADD GRAPHICS | Freelance Graphic Designer" />
    <meta
      property="og:description"
      content="Personal graphic design portfolio by Mufaddhol, focused on clear visual design for brands, organizations, events, and promotional needs."
    />
    <meta property="og:image" content="/og-cover.webp" />
    <meta property="twitter:card" content="summary_large_image" />
    <meta
      property="twitter:title"
      content="FADD GRAPHICS | Freelance Graphic Designer"
    />
    <meta
      property="twitter:description"
      content="Personal graphic design portfolio by Mufaddhol, focused on clear visual design for brands, organizations, events, and promotional needs."
    />
    <meta property="twitter:image" content="/og-cover.webp" />
    <script>
      const storedTheme = localStorage.getItem("fadd-theme");
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;

      if (storedTheme === "dark" || (!storedTheme && prefersDark)) {
        document.documentElement.classList.add("dark");
      }
    </script>
  </head>
  <body class="bg-bg text-text antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
