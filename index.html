<!doctype html>
<html lang="id" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FADD GRAPHICS | Studio Desain Grafis</title>
    <meta
      name="description"
      content="FADD GRAPHICS adalah studio desain grafis independen untuk brand, organisasi, dan event yang membutuhkan visual yang rapi, kuat, dan relevan."
    />
    <meta
      name="theme-color"
      content="#f7f4ef"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#10141b"
      media="(prefers-color-scheme: dark)"
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="FADD GRAPHICS | Studio Desain Grafis" />
    <meta
      property="og:description"
      content="Portofolio desain grafis premium dengan layanan identitas visual, materi promosi, dan desain kampanye yang terstruktur."
    />
    <meta property="og:image" content="/og-cover.webp" />
    <meta property="twitter:card" content="summary_large_image" />
    <meta
      property="twitter:title"
      content="FADD GRAPHICS | Studio Desain Grafis"
    />
    <meta
      property="twitter:description"
      content="Portofolio desain grafis premium dengan layanan identitas visual, materi promosi, dan desain kampanye yang terstruktur."
    />
    <meta property="twitter:image" content="/og-cover.webp" />
    <script>
      const storedTheme = localStorage.getItem("fadd-theme");
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;

      if (storedTheme === "dark" || (!storedTheme && prefersDark)) {
        document.documentElement.classList.add("dark");
      }
    </script>
  </head>
  <body class="bg-bg text-text antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
